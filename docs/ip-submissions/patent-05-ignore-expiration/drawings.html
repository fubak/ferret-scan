      .ref { font-weight: bold; font-size: 11px; }
      .tl-arrow { stroke: #000; stroke-width: 1.5; fill: none; marker-end: url(#arr3); }
      .vert { stroke: #000; stroke-width: 1.2; fill: none; }
      .vert-dashed { stroke: #000; stroke-width: 1; fill: none; stroke-dasharray: 5,3; }
      .vert-bold { stroke: #000; stroke-width: 2.5; fill: none; }
      .bracket { stroke: #000; stroke-width: 1.2; fill: none; }
      .leader { stroke: #000; stroke-width: 0.75; fill: none; }
    </style>

    <!-- ═══ TIMELINE AXIS ═══ -->
    <!-- Main horizontal axis -->
    <line class="tl-arrow" x1="40" y1="180" x2="650" y2="180"/>
    <text fill="#000" x="548" y="172" font-size="9.5px">TIME →</text>

    <!-- ── KEY X POSITIONS ── -->
    <!-- 570: DIRECTIVE CREATED  x=80 -->
    <!-- 576: WARN THRESHOLD     x=380 -->
    <!-- 574: EXPIRY DATE        x=480 -->
    <!-- right zone end          x=620 -->

    <!-- ── DIRECTIVE CREATED (570) ── thin vertical line at x=80 -->
    <line class="vert" x1="80" y1="120" x2="80" y2="230"/>
    <!-- Leader line to label -->
    <line class="leader" x1="80" y1="118" x2="80" y2="100"/>
    <text fill="#000" x="82" y="115" font-size="9px">DIRECTIVE</text>
    <text fill="#000" x="82" y="105" font-size="9px">CREATED</text>
    <text fill="#000" x="82" y="95" font-weight="bold" font-size="11px">(570)</text>

    <!-- ── ACTIVE ZONE bracket (80 → 480) ── -->
    <!-- top bracket line -->
    <path class="bracket" d="M80,148 L80,140 L480,140 L480,148"/>
    <!-- Label in center of bracket -->
    <text fill="#000" x="180" y="135" font-size="9px" text-anchor="middle">ACTIVE ZONE — FINDING SUPPRESSED</text>
    <text fill="#000" x="280" y="124" font-weight="bold" font-size="10px" text-anchor="middle">(572)</text>
    <!-- Sub-label below axis -->
    <text fill="#000" x="240" y="198" font-size="9px" font-style="italic">shouldIgnoreFinding() → true</text>

    <!-- ── WARN ZONE (576 → 574) ── dashed vertical at x=380 -->
    <line class="vert-dashed" x1="380" y1="110" x2="380" y2="230"/>
    <!-- Label above -->
    <line class="leader" x1="380" y1="108" x2="340" y2="70"/>
    <text fill="#000" x="200" y="68" font-size="9px">AUDIT WARNING THRESHOLD</text>
    <text fill="#000" x="200" y="58" font-size="9px">(EXPIRY DATE − LOOKAHEAD_DAYS)</text>
    <text fill="#000" x="200" y="48" font-weight="bold" font-size="11px">(576)</text>

    <!-- WARN ZONE small bracket (380 → 480) -->
    <path class="bracket" d="M380,158 L380,152 L480,152 L480,158"/>
    <text fill="#000" x="430" y="148" font-size="8px" text-anchor="middle">WARN ZONE</text>
    <text fill="#000" x="430" y="139" font-weight="bold" font-size="10px" text-anchor="middle">(578)</text>

    <!-- ── EXPIRY DATE (574) ── bold vertical at x=480 -->
    <line class="vert-bold" x1="480" y1="115" x2="480" y2="230"/>
    <!-- Label above -->
    <line class="leader" x1="480" y1="113" x2="530" y2="80"/>
    <text fill="#000" x="532" y="78" font-size="9px">EXPIRY DATE</text>
    <text fill="#000" x="532" y="68" font-weight="bold" font-size="11px">(574)</text>

    <!-- ── EXPIRED ZONE bracket (480 → 620) ── -->
    <path class="bracket" d="M480,148 L480,140 L620,140 L620,148"/>
    <text fill="#000" x="550" y="135" font-size="9px" text-anchor="middle">EXPIRED ZONE — FINDING</text>
    <text fill="#000" x="550" y="124" font-size="9px" text-anchor="middle">REACTIVATED</text>
    <text fill="#000" x="550" y="113" font-weight="bold" font-size="10px" text-anchor="middle">(580)</text>
    <!-- Sub-label below axis -->
    <text fill="#000" x="548" y="198" font-size="9px" font-style="italic">shouldIgnoreFinding() → false</text>
    <text fill="#000" x="548" y="209" font-size="9px" font-style="italic">suppressionExpired: true</text>

    <!-- ═══ SCAN TIME MARKER ROW ═══ -->
    <!-- Divider line -->
    <line x1="40" y1="255" x2="640" y2="255" stroke="#000" stroke-width="0.5" stroke-dasharray="3,3"/>
    <text fill="#000" x="40" y="273" font-size="9px" font-weight="bold">SCAN TIME</text>
    <text fill="#000" x="40" y="285" font-weight="bold" font-size="11px">(582)</text>
    <text fill="#000" x="120" y="273" font-size="9px" font-style="italic">— moveable marker on timeline</text>

    <!-- Scenario 1: 582 < 574 (suppressed) -->
    <!-- Marker triangle at x=240 -->
    <polygon points="240,300 233,315 247,315" fill="#000" stroke="#000" stroke-width="0.5"/>
    <line x1="240" y1="315" x2="240" y2="330" stroke="#000" stroke-width="1"/>
    <line x1="40" y1="315" x2="640" y2="315" stroke="#000" stroke-width="0.5"/>
    <!-- Reference axis ticks -->
    <line x1="80" y1="312" x2="80" y2="318" stroke="#000" stroke-width="1"/>
    <line x1="380" y1="312" x2="380" y2="318" stroke="#000" stroke-width="1"/>
    <line x1="480" y1="312" x2="480" y2="318" stroke="#000" stroke-width="1"/>
    <text fill="#000" x="240" y="345" font-size="9px" text-anchor="middle" font-style="italic">582 &lt; 574 → finding suppressed</text>
    <text fill="#000" x="240" y="357" font-size="8px" text-anchor="middle">(SCAN TIME before expiry)</text>

    <!-- Scenario 2: 582 >= 574 (reactivated) -->
    <polygon points="530,380 523,395 537,395" fill="#000" stroke="#000" stroke-width="0.5"/>
    <line x1="530" y1="395" x2="530" y2="410" stroke="#000" stroke-width="1"/>
    <line x1="40" y1="395" x2="640" y2="395" stroke="#000" stroke-width="0.5"/>
    <line x1="80" y1="392" x2="80" y2="398" stroke="#000" stroke-width="1"/>
    <line x1="380" y1="392" x2="380" y2="398" stroke="#000" stroke-width="1"/>
    <line x1="480" y1="392" x2="480" y2="398" stroke="#000" stroke-width="1"/>
    <text fill="#000" x="530" y="425" font-size="9px" text-anchor="middle" font-style="italic">582 ≥ 574 → finding reactivated</text>
    <text fill="#000" x="530" y="437" font-size="8px" text-anchor="middle">(SCAN TIME at or after expiry)</text>

    <!-- Scenario 3: 576 <= 582 < 574 (warn zone) -->
    <polygon points="420,455 413,470 427,470" fill="none" stroke="#000" stroke-width="1"/>
    <line x1="420" y1="470" x2="420" y2="485" stroke="#000" stroke-width="1" stroke-dasharray="3,2"/>
    <line x1="40" y1="470" x2="640" y2="470" stroke="#000" stroke-width="0.5"/>
    <line x1="80" y1="467" x2="80" y2="473" stroke="#000" stroke-width="1"/>
    <line x1="380" y1="467" x2="380" y2="473" stroke="#000" stroke-width="1"/>
    <line x1="480" y1="467" x2="480" y2="473" stroke="#000" stroke-width="1"/>
    <text fill="#000" x="420" y="492" font-size="9px" text-anchor="middle" font-style="italic">576 ≤ 582 &lt; 574 → audit warning emitted</text>
    <text fill="#000" x="420" y="503" font-size="8px" text-anchor="middle">(SCAN TIME in warn zone, suppression still active)</text>
  </svg>

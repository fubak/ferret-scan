name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: ['18', '20', '22']
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run linter
        run: npm run lint

      - name: Run type check
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Check JSON schema is in sync with zod
        run: npm run schema:check

      - name: Run tests with coverage (enforces thresholds)
        run: npm run test:coverage
        env:
          FERRET_E2E: '1'

  benchmark:
    name: Benchmark
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' || github.event_name == 'pull_request'
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Download baseline benchmark (main branch)
        id: restore-baseline
        uses: actions/cache/restore@v4
        with:
          path: baseline.json
          key: bench-baseline-${{ github.base_ref || 'main' }}
          restore-keys: bench-baseline-

      - name: Run benchmark
        run: node scripts/bench.mjs --json > bench.json

      - name: Compare with baseline
        run: node scripts/bench-compare.mjs --baseline baseline.json --current bench.json --threshold 0.20

      - name: Save new baseline (main branch only)
        if: github.ref == 'refs/heads/main'
        uses: actions/cache/save@v4
        with:
          path: bench.json
          key: bench-baseline-main

      - name: Upload benchmark artifact
        uses: actions/upload-artifact@v7
        with:
          name: benchmark-results
          path: bench.json
          retention-days: 30

  self-scan:
    name: Self Scan
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Run Ferret self-scan (SARIF)
        run: node bin/ferret.js scan . --format sarif -o ferret-self-scan.sarif || true

      - name: Run Ferret self-scan (CI gate)
        run: node bin/ferret.js scan . --ci

      - name: Upload self-scan SARIF
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: ferret-self-scan.sarif
          category: ferret-self-scan

      - name: Summary
        run: |
          {
            echo "## 🔍 Ferret Self-Scan Results"
            echo ""
            echo "Ferret successfully scanned its own codebase for security issues."
          } >> "$GITHUB_STEP_SUMMARY"
